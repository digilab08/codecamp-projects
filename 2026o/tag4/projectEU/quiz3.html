<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>EU Fakten-Check</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #fa00ed;
        text-align: center;
        padding: 50px;
      }
      .anzeige-box {
        background-color: rgb(1, 0, 77);
        color: #00ffea;
        padding: 40px;
        border: 4px solid rgb(21, 255, 0);
        border-radius: 20px;
        font-size: 24px;
        margin-bottom: 30px;
        min-height: 80px;
      }
      button {
        padding: 20px 40px;
        font-size: 20px;
        cursor: pointer;
        background-color: white;
        border-radius: 15px;
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <h1>Warum die EU wichtig ist</h1>
    <p>Klick auf den Button, um die Vorteile nacheinander zu sehen!</p>
    <div class="anzeige-box" id="textFeld">Klick mal auf den Button!</div>
    <button onclick="naechsterFakt()">Nächster Vorteil →</button>
    <script>
      let nummer = 0;
      function naechsterFakt() {
        const vorteile = [
          "1. Reisen ohne Grenzen in Europa! ",
          "2. Frieden zwischen den Mitgliedsländern. ",
          "3. Bezahlen mit dem Euro fast überall. ",
          "4. Keine Extra-Kosten fürs Handy im Ausland. ",
          "5. Strenge Regeln für sicheres Spielzeug. ",
        ];
        document.getElementById("textFeld").innerText = vorteile[nummer];
        nummer += 1;
        if (nummer === vorteile.length) {
          nummer = 0;
          console.log("Liste fertig! Wir fangen von vorne an.");
        }
        console.log("Aktuelle Nummer ist: " + nummer);
      }
    </script>
    <p><a href="index.html">Zurück</a></p>
  </body>
</html>
