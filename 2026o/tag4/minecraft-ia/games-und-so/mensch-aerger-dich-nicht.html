        function generateMove(col, space)
        {
            switch(col)
            {
                case 0:
                    switch(blueFigures.indexOf(space))
                    {
                        case 0:
                            return(blueW0.cloneNode(true));
                        case 1:
                            return(blueW1.cloneNode(true));
                        case 2:
                            return(blueW2.cloneNode(true));
                        case 3:
                            return(blueW3.cloneNode(true));
                    }
                    break;
                case 1:
                    switch(greenFigures.indexOf(space))
                    {
                        case 0:
                            return(greenW0.cloneNode(true));
                        case 1:
                            return(greenW1.cloneNode(true));
                        case 2:
                            return(greenW2.cloneNode(true));
                        case 3:
                            return(greenW3.cloneNode(true));
                    }
                    break;
                case 2:
                    switch(redFigures.indexOf(space))
                    {
                        case 0:
                            return(redW0.cloneNode(true));
                        case 1:
                            return(redW1.cloneNode(true));
                        case 2:
                            return(redW2.cloneNode(true));
                        case 3:
                            return(redW3.cloneNode(true));
                    }
                    break;
                case 3:
                    switch(yellowFigures.indexOf(space))
                    {
                        case 0:
                            return(yellowW0.cloneNode(true));
                        case 1:
                            return(yellowW1.cloneNode(true));
                        case 2:
                            return(yellowW2.cloneNode(true));
                        case 3:
                            return(yellowW3.cloneNode(true));
                    }
                    break;
            }
        }
        function isOnSquare(square)
        {
            if(blueFigures.includes(square))
            {return(0)}
            else if(greenFigures.includes(square))
            {return(1)}
            else if(redFigures.includes(square))
            {return(2)}
            else if(yellowFigures.includes(square))
            {return(3)}
            return(-1);
        }
        function addBlankSquare(pos)
        {
            color = isOnSquare(pos);
            console.log(color, " ", pos);
            if(color == -1)

            if(color == 0)

            }
        }
        function addColoredSquare(col, square)
        {
            let space = null;
            switch(col)
            {
                case 0:
                    if(blueFigures.includes(square))
                        {space = generateMove(col, square);}
                    else
                        {space = blue.cloneNode(true);}
                    return(space);
                case 1:
                    if(greenFigures.includes(square))
                        {space = generateMove(col, square);}
                    else
                        {space = green.cloneNode(true);}
                    return(space);
                case 2:
                    if(redFigures.includes(square))
                        {space = generateMove(col, square);}
                    else
                        {space = red.cloneNode(true);}
                    return(space);
                case 3:
                    if(yellowFigures.includes(square))
                        {space = generateMove(col, square);}
                    else
                        {space = yellow.cloneNode(true);}
                    return(space);
                default:
                    return("f u");
                break;
            }
        }
