  <button onclick="plusPokemon()">Klick für Gratis Pokemons</button>
  <script>
    let pokemons = 0;
    let pokemonsHtml = document.getElementById("pokemons");
    function plusPokemon() {
      pokemons++;
      pokemonsHtml.innerText = pokemons;
    }

  <input type="text" onchange="send(this)" />
  <div id="narichten"></div>
  <script>
    narichtenhtml = document.getElementById("narichten");
    function send(textInput) {
      //narichtenhtml.innertext +=
      narichtenhtml.innerText += " " + textInput.value;
    }
  </script>

  <h2 id="titel">Pokemon</h2>
  <p id="info">Tagebuch extras:</p>
  <div id="ausgabe"></div>

  <button onclick="titelAendern()">Anfangen zu speichern!</button>
  <button onclick="eintragHinzufuegen()">
    Speichere, wann du deinen Tagebuch Eintrag geschrieben hast!
  </button>

  <script>
    function titelAendern() {
      let titelElement = document.getElementById("titel");
      let alterTitel = titelElement.innerText;

      alert("Alter Titel: " + alterTitel);
      titelElement.innerText = "Einträge:";

      document.getElementById("info").innerText =
        "Speicher jetzt deine Zeiten direkt hier unten!";
    }

    function eintragHinzufuegen() {
      let neuerEintrag = document.createElement("p");
      neuerEintrag.innerText =
        "Neuer Eintrag um " + new Date().toLocaleTimeString();

      let ausgabe = document.getElementById("ausgabe");
      ausgabe.appendChild(neuerEintrag);
    }
  </script>

<script>
  let counter = 0
  function textAendern(btn) {
    // "btn" ist das übergebene Button-Element
    counter++
    if(counter === 1){
       btn.innerText = 'Überraschung!'
    }
    if(counter === 2){
btn.innerText = 'Immer noch da?'
    }
    if (counter === 3) {
      btn.innerText = 'Was erwartest du?'
    }
    if (counter === 4) {
      btn.innerText = 'Willst du etwa noch eine Überraschung?'
    }
    if (counter === 5) {
      btn.innerText = 'Also langsam reicht es...'
    }
    if ( counter === 6) {
      btn.innerText = ' Wie lange bist du noch da???'
    }
    if (counter === 7) {
      btn.innerText = 'Ernsthaft?'
    }
    if (counter ===8) {
      btn.innerText = 'Tschüss, keine Lust mehr!'
    }
   
  }
