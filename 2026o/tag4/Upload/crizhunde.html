<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html lang="de">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lagotto Romagnolo Quiz</title>
        <style>
          body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background-color: #fdf5e6;
            color: #5d4037;
          }
          .quiz-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 8px solid #8d6e63;
          }
          h1 {
            color: #3e2723;
            border-bottom: 2px solid #d7ccc8;
            padding-bottom: 10px;
          }
          .question {
            font-weight: bold;
            margin: 20px 0 10px;
            font-size: 1.1em;
          }
          .options {
            margin-bottom: 20px;
          }
          label {
            display: block;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
          }
          label:hover {
            background-color: #efebe9;
          }
          button {
            background: #5d4037;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background 0.3s;
          }
          button:hover {
            background: #4e342e;
          }
          #result {
            margin-top: 25px;
            font-weight: bold;
            font-size: 1.2em;
            text-align: center;
            color: #2e7d32;
          }
        </style>
      </head>
      <body>
        <div class="quiz-card">
          <h1>Lagotto Romagnolo Quiz 🐶</h1>
          <div id="quiz-content"></div>
          <button onclick="checkAnswers()">Ergebnis auswerten</button>
          <p id="result"></p>
        </div>

        <script>
          const questions = [
            {
              q: "Aus welcher Region Italiens stammt der Lagotto ursprünglich?",
              options: ["Toskana", "Romagna", "Sizilien"],
              correct: 1,
            },
            {
              q: "Was ist heute die Hauptaufgabe dieser Rasse?",
              options: ["Schafhüten", "Wachdienst", "Trüffelsuche"],
              correct: 2,
            },
            {
              q: "Warum ist er besonders für viele Allergiker geeignet?",
              options: [
                "Er hat kein Fell",
                "Er haart fast nicht",
                "Er wird nie schmutzig",
              ],
              correct: 1,
            },
          ];

          function loadQuiz() {
            const container = document.getElementById("quiz-content");
            questions.forEach((item, index) => {
              let html = `<div class="question">${index + 1}. ${item.q}</div><div class="options">`;
              item.options.forEach((opt, i) => {
                html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`;
              });
              html += `</div>`;
              container.innerHTML += html;
            });
          }

          function checkAnswers() {
            let score = 0;
            questions.forEach((item, index) => {
              const selected = document.querySelector(
                `input[name="q${index}"]:checked`,
              );
              if (selected && parseInt(selected.value) === item.correct) {
                score++;
              }
            });
            document.getElementById("result").innerText =
              `Du hast ${score} von ${questions.length} Punkten erreicht!`;
          }

          loadQuiz();
        </script>
      </body>
      <a href="onehund.html">zurück</a>
      <a href="qiuztwo.html">zum nächsten quiz</a>
    </html>
  </body>
</html>
