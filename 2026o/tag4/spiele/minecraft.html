<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html>
      <head>
        <title>Flappy Bird JS</title>
        <style>
          body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #222;
            font-family: sans-serif;
            overflow: hidden;
          }
          canvas {
            border: 5px solid #fff;
            background: #70c5ce;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
          }
          #info {
            position: absolute;
            top: 10px;
            color: white;
            text-align: center;
            pointer-events: none;
          }
        </style>
      </head>
      <body>
        <div id="info"><h1>SPACE oder KLICK zum Springen</h1></div>
        <canvas id="game" width="400" height="600"></canvas>

        <script>
          const canvas = document.getElementById("game");
          const ctx = canvas.getContext("2d");

          // Game Variables
          let birdY = 300,
            birdX = 50,
            velocity = 0,
            gravity = 0.5,
            score = 0;
          let pipes = [],
            frame = 0,
            gameOver = false;

          function reset() {
            birdY = 300;
            velocity = 0;
            score = 0;
            pipes = [];
            frame = 0;
            gameOver = false;
          }

          function drawBird() {
            ctx.fillStyle = "#f4d03f"; // Yellow
            ctx.fillRect(birdX, birdY, 30, 30);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(birdX, birdY, 30, 30);
          }

          function updatePipes() {
            if (frame % 90 === 0) {
              let gap = 150;
              let minH = 50;
              let h =
                Math.floor(Math.random() * (canvas.height - gap - 100)) + minH;
              pipes.push({
                x: canvas.width,
                top: h,
                bottom: canvas.height - h - gap,
              });
            }
            for (let i = pipes.length - 1; i >= 0; i--) {
              pipes[i].x -= 3;
              if (pipes[i].x + 50 < 0) {
                pipes.splice(i, 1);
                score++;
              }

              // Collision detection
              if (birdX + 30 > pipes[i].x && birdX < pipes[i].x + 50) {
                if (
                  birdY < pipes[i].top ||
                  birdY + 30 > canvas.height - pipes[i].bottom
                )
                  gameOver = true;
              }
            }
          }

          function drawPipes() {
            ctx.fillStyle = "#2ecc71"; // Green
            pipes.forEach((p) => {
              ctx.fillRect(p.x, 0, 50, p.top);
              ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom);
            });
          }

          function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameOver) {
              velocity += gravity;
              birdY += velocity;
              updatePipes();
              frame++;
            } else {
              ctx.fillStyle = "rgba(0,0,0,0.5)";
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.fillStyle = "white";
              ctx.font = "30px Arial";
              ctx.fillText("GAME OVER", 110, 300);
              ctx.font = "20px Arial";
              ctx.fillText("Klick zum Neustart", 115, 340);
            }

            drawPipes();
            drawBird();

            // Score
            ctx.fillStyle = "white";
            ctx.font = "40px Arial";
            ctx.fillText(score, canvas.width / 2 - 10, 50);

            // Floor/Ceiling collision
            if (birdY + 30 > canvas.height || birdY < 0) gameOver = true;

            requestAnimationFrame(loop);
          }

          function jump() {
            if (gameOver) reset();
            else velocity = -8;
          }

          window.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
          });
          canvas.addEventListener("mousedown", jump);

          loop();
        </script>
      </body>
    </html>
    <a href="game.html">züruck</a>
  </body>
</html>
