<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html lang="de">
      <head>
        <meta charset="UTF-8" />
        <title>Snake: UNSTERBLICH Edition</title>
        <style>
          body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: "Courier New", monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
          }
          canvas {
            border: 4px solid #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            background: #000;
          }
          .stats {
            margin-bottom: 10px;
            font-size: 1.8rem;
            font-weight: bold;
          }
          .mode {
            color: #ff00ff;
            font-size: 1rem;
            margin-top: 5px;
            text-transform: uppercase;
          }
        </style>
      </head>
      <body>
        <div class="stats">SCORE: <span id="score">0</span></div>
        <div class="mode">✨ GOD MODE: AKTIVIERT ✨</div>
        <canvas id="snakeGame" width="600" height="600"></canvas>
        <div style="margin-top: 10px; color: #888">
          Steuerung: WASD | Wände sind Portale!
        </div>

        <script>
          const canvas = document.getElementById("snakeGame");
          const ctx = canvas.getContext("2d");
          const scoreEl = document.getElementById("score");

          const box = 20;
          let score = 0;
          let snake = [{ x: 15 * box, y: 15 * box }];
          let foodList = [];
          let d = "RIGHT";

          // 50 Äpfel
          for (let i = 0; i < 50; i++) {
            spawnFood();
            spawnFood();
            spawnFood();
            spawnFood();
            spawnFood();
          }

          function spawnFood() {
            foodList.push({
              x: Math.floor(Math.random() * (canvas.width / box)) * box,
              y: Math.floor(Math.random() * (canvas.height / box)) * box,
            });
          }

          document.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if ((key == "a" || e.keyCode == 37) && d != "RIGHT") d = "LEFT";
            else if ((key == "w" || e.keyCode == 38) && d != "DOWN") d = "UP";
            else if ((key == "d" || e.keyCode == 39) && d != "LEFT")
              d = "RIGHT";
            else if ((key == "s" || e.keyCode == 40) && d != "UP") d = "DOWN";
          });

          function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Äpfel
            ctx.fillStyle = "#ff4d4d";
            foodList.forEach((f) => {
              ctx.beginPath();
              ctx.arc(
                f.x + box / 2,
                f.y + box / 2,
                box / 2 - 2,
                0,
                Math.PI * 2,
              );
              ctx.fill();
            });

            // Schlange
            snake.forEach((part, i) => {
              ctx.fillStyle = i == 0 ? "#00ff41" : "#008f11";
              ctx.fillRect(part.x, part.y, box, box);
            });

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // --- PORTAL LOGIK (Durch Wände gehen) ---
            if (snakeX < 0) snakeX = canvas.width - box;
            else if (snakeX >= canvas.width) snakeX = 0;

            if (snakeY < 0) snakeY = canvas.height - box;
            else if (snakeY >= canvas.height) snakeY = 0;

            // Fressen prüfen
            let ateIndex = foodList.findIndex(
              (f) => f.x === snakeX && f.y === snakeY,
            );
            if (ateIndex !== -1) {
              score++;
              scoreEl.innerText = score;
              foodList.splice(ateIndex, 1);
              spawnFood();
              spawnFood();
              spawnFood();
              spawnFood();
            } else {
              snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Kollisions-Check entfernt für UNSTERBLICHKEIT!
            snake.unshift(newHead);
          }

          let game = setInterval(draw, 100);
        </script>
      </body>
    </html>
    <a href="game.html">zurück</a>
  </body>
</html>
