<!doctype html>

    <title>Clicker</title>

    <h1 class="cookieCounter">Cookies: <span id="Cookies">0</span></h1>
    <p class="CPS">CPS: <span id="CPS">0</span></p>
    <div class="Button">
     <h2></h2><button onclick="plusCookies()">Klick für Cookies</button></div>

    <script>
      //--Cookie Button----------------------------------------------------------------
      let Cookies = 0;
      let CookiesHtml = document.getElementById("Cookies");
      let Clickpower = 1;
      function plusCookies() {
        Cookies = Cookies + Clickpower;
        CookiesHtml.innerText = Cookies;
      }
    </script>
    <p>Cursor: <span id="cursor">0</span></p>
    <button onclick="buyCursor()">
      buy Cursor:<span id="CostCursor">30</span>c
    </button>
    <script>
      //--- Cursor Abteil-------------------------------------------------------------------
      let CursorPower = 0.5;
      let CPS = 0;
      let cursorCost = 30;
      let cursor = 0;
      let cursorHtml = document.getElementById("cursor");
      let CPSHtml = document.getElementById("CPS");
      let CostCursorHtml = document.getElementById("CostCursor");
      function buyCursor() {
        if (Cookies >= cursorCost) {
          cursor = cursor + 1;
          Cookies = Cookies - cursorCost;
          CookiesHtml.innerText = Cookies;
          cursorHtml.innerText = cursor;
          CPS = CPS + CursorPower;
          CPSHtml.innerText = CPS;
          cursorCost = Math.floor(cursorCost * 1.1);
          CostCursorHtml.innerText = cursorCost;
        }
      }
      setInterval(() => {
        Cookies = Cookies + cursor * CursorPower;
        CookiesHtml.innerText = Cookies;
      }, 1000);
    </script>
