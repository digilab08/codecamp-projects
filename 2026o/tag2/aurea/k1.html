<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Küken</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
        color: #333;
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
      }

      .nav {
        text-align: center;
        margin-bottom: 20px;
      }

      .nav a {
        margin: 0 10px;
        text-decoration: none;
        color: #b2b7d1;
        font-weight: bold;
      }

      .nav a:hover {
        text-decoration: underline;
      }

      .image-container {
        text-align: center;
        margin-bottom: 30px;
      }

      .image-container img {
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        margin-top: 20px;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #73757c;
        color: white;
        text-align: left;
      }

      tr:nth-child(even) {
        background: #e8e8ff;
      }

      iframe {
        width: 100%;
        height: 350px;
        border: none;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <h1>Namenloses Küken</h1>

    <div class="nav">
      <a href="index.html">Zurück</a>
    </div>

    <div class="image-container">
      <img
        loading="lazy"
        src="https://lh3.googleusercontent.com/pw/AP1GczPEd2qTOJRjZkzEmRBrFnRdsERbBkjKc2Y7UXYeshqwS2hia8WxGVf9uZryaHUeYWGAVTBN9qZF8vX5ISiIMiPnnUKzXqAbnHAuk76RAIfJd3Fc9SNel0AjAGHirFLFXhHHwNet8i8dCyrPSBfo8f7q=w696-h928-s-no-gm"
        alt="Floppy"
        width="220"
      />
    </div>

    <h2>Infos über eines der Küken</h2>

    <table>
      <tr>
        <th>Rasse</th>
        <th>Alter</th>
        <th>Schlupfort</th>
        <th>Grund des Namens</th>
      </tr>

      <tr>
        <td>Zwerg-Cochin</td>
        <td>Ca. 2 Monate</td>
        <td>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d316054.2234046737!2d3.785541689062511!3d51.7664331!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c432981f6539a9%3A0x121a5fa320a8cbc3!2sDe%20Kippenspecialist!5e0!3m2!1sde!2sde!4v1774872137262!5m2!1sde!2sde"
            loading="lazy"
          ></iframe>
        </td>
        <td>Der Name steht noch nicht fest.</td>
      </tr>
    </table>
    <html></html>
  </body>
</html>
