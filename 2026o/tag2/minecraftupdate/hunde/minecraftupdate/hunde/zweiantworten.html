<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html lang="de">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lagotto Quiz - 15 Fragen</title>
        <style>
          body {
            font-family: sans-serif;
            background: #f4ece1;
            color: #4e342e;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
          }
          .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          }
          h1 {
            text-align: center;
            color: #8d6e63;
          }
          .q-block {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
          }
          .q-text {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
          }
          .options {
            display: flex;
            gap: 10px;
          }
          label {
            flex: 1;
            background: #efebe9;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: 2px solid transparent;
          }
          input[type="radio"] {
            display: none;
          }
          input[type="radio"]:checked + span {
            font-weight: bold;
          }
          label:has(input:checked) {
            border-color: #8d6e63;
            background: #d7ccc8;
          }
          button {
            width: 100%;
            padding: 15px;
            background: #8d6e63;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 20px;
          }
          #res {
            display: none;
            text-align: center;
            font-size: 1.3em;
            margin-top: 20px;
            color: #3e2723;
          }
        </style>
      </head>
      <body>
        <div class="card">
          <h1>Lagotto Quick-Quiz 🐾</h1>
          <p style="text-align: center">15 Fragen | Je 2 Antworten</p>
          <form id="quizForm">
            <div id="questions"></div>
            <button type="button" onclick="showResult()">
              Ergebnis prüfen
            </button>
          </form>
          <div id="res"></div>
        </div>

        <script>
          const data = [
            { q: "Woher kommt er?", a: ["Italien", "Spanien"], c: 0 },
            { q: "Ist er ein Wasserhund?", a: ["Ja", "Nein"], c: 0 },
            {
              q: "Was sucht er heute meistens?",
              a: ["Trüffel", "Enten"],
              c: 0,
            },
            {
              q: "Haart ein Lagotto?",
              a: ["Fast gar nicht", "Sehr stark"],
              c: 0,
            },
            {
              q: "Wie ist sein Fell?",
              a: ["Lockig/Wollig", "Glatt/Seidig"],
              c: 0,
            },
            {
              q: "Muss er geschoren werden?",
              a: ["Ja", "Nein, niemals"],
              c: 0,
            },
            {
              q: "Ist er für Anfänger geeignet?",
              a: ["Ja, mit Erziehung", "Nein, nur für Profis"],
              c: 0,
            },
            {
              q: "Mag er Wasser?",
              a: ["Meistens ja", "Eher wasserscheu"],
              c: 0,
            },
            {
              q: "Wie ist sein Jagdtrieb heute?",
              n: "Eher gering (außer Nase)",
              a: ["Stark ausgeprägt", "Eher gering"],
              c: 1,
            },
            {
              q: "Ist er ein 'Ein-Personen-Hund'?",
              a: ["Nein, Familienhund", "Ja, nur eine Bezugsperson"],
              c: 0,
            },
            {
              q: "Braucht er geistige Arbeit?",
              a: ["Ja, unbedingt", "Nein, Gassi reicht"],
              c: 0,
            },
            {
              q: "Wie groß ist er etwa?",
              a: ["Mittelgroß", "Sehr groß (Riesig)"],
              c: 0,
            },
            {
              q: "Wann wurde er offiziell anerkannt?",
              a: ["In den 1990ern", "Schon im Jahr 1800"],
              c: 0,
            },
            {
              q: "Ist er wachsam?",
              a: ["Ja, er schlägt an", "Nein, er ignoriert Fremde"],
              c: 0,
            },
            {
              q: "Neigt er zu Übergewicht?",
              a: ["Ja, er ist verfressen", "Nein, er frisst kaum"],
              c: 0,
            },
          ];

          const container = document.getElementById("questions");
          data.forEach((item, i) => {
            container.innerHTML += `
            <div class="q-block">
                <span class="q-text">${i + 1}. ${item.q}</span>
                <div class="options">
                    <label><input type="radio" name="q${i}" value="0"> <span>${item.a[0]}</span></label>
                    <label><input type="radio" name="q${i}" value="1"> <span>${item.a[1]}</span></label>
                </div>
            </div>`;
          });

          function showResult() {
            let score = 0;
            data.forEach((item, i) => {
              const sel = document.querySelector(`input[name="q${i}"]:checked`);
              if (sel && parseInt(sel.value) === item.c) score++;
            });
            const r = document.getElementById("res");
            r.style.display = "block";
            r.innerHTML = `Fertig! Du hast <b>${score} von 15</b> richtig. <br> ${score > 10 ? "Ein echter Lagotto-Kenner! 🍄" : "Probier es nochmal! 🐾"}`;
            window.scrollTo(0, document.body.scrollHeight);
          }
        </script>
      </body>
    </html>
    <a href="onehund.html">züruck zu seite eins</a>
  </body>
</html>
