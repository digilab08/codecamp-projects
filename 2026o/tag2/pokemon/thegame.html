<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Pokémon Kampf</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #f0f0f0;
      }
      .pokemon {
        display: inline-block;
        margin: 20px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        width: 200px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      #log {
        margin-top: 20px;
        background: #222;
        color: #0f0;
        padding: 10px;
        height: 200px;
        overflow-y: auto;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <h1>⚔️ Pokémon Kampf</h1>

    <div class="pokemon">
      <h2 id="name1">Pikachu</h2>
      <p>HP: <span id="hp1">50</span></p>
    </div>

    <div class="pokemon">
      <h2 id="name2">Glumanda</h2>
      <p>HP: <span id="hp2">55</span></p>
    </div>

    <br />
    <button onclick="fight()">Angreifen!</button>

    <div id="log"></div>

    <script>
      class Pokemon {
        constructor(name, hp, attack) {
          this.name = name;
          this.hp = hp;
          this.attack = attack;
        }

        isAlive() {
          return this.hp > 0;
        }

        attackEnemy(enemy) {
          const damage = Math.floor(Math.random() * this.attack) + 1;
          enemy.hp -= damage;
          log(`${this.name} macht ${damage} Schaden!`);
        }
      }

      const p1 = new Pokemon("Pikachu", 50, 12);
      const p2 = new Pokemon("Glumanda", 55, 10);

      function updateUI() {
        document.getElementById("hp1").textContent = Math.max(p1.hp, 0);
        document.getElementById("hp2").textContent = Math.max(p2.hp, 0);
      }

      function log(text) {
        const logDiv = document.getElementById("log");
        logDiv.innerHTML += text + "<br>";
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function fight() {
        if (!p1.isAlive() || !p2.isAlive()) {
          log("Kampf ist vorbei! Seite neu laden für neuen Kampf.");
          return;
        }

        p1.attackEnemy(p2);
        if (p2.isAlive()) {
          p2.attackEnemy(p1);
        }

        updateUI();

        if (!p1.isAlive() || !p2.isAlive()) {
          const winner = p1.isAlive() ? p1.name : p2.name;
          log("🏆 " + winner + " hat gewonnen!");
        }
      }
    </script>
  </body>
</html>
