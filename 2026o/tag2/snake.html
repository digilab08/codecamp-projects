<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Snake - Unsterblich (Keine Selbstkollision)</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #2c3e50;
        color: white;
        font-family: Arial, sans-serif;
        flex-direction: column;
      }
      canvas {
        border: 5px solid #ecf0f1;
        background-color: #000;
      }
      .score {
        font-size: 24px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="score">
      Punkte: <span id="scoreVal">0</span> | Äpfel:
      <span id="appleCount">1</span>
    </div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
      const canvas = document.getElementById("snakeGame");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("scoreVal");
      const appleCountElement = document.getElementById("appleCount");

      const grid = 20;
      let count = 0;
      let score = 0;

      let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
      let apples = [{ x: 320, y: 320 }];

      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min)) + min;
      }

      function spawnApple() {
        apples.push({
          x: getRandomInt(0, 20) * grid,
          y: getRandomInt(0, 20) * grid,
        });
      }

      function loop() {
        requestAnimationFrame(loop);
        if (++count < 6) return;
        count = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        snake.x += snake.dx;
        snake.y += snake.dy;

        // Wand-Teleportation beibehalten
        if (snake.x < 0) snake.x = canvas.width - grid;
        else if (snake.x >= canvas.width) snake.x = 0;
        if (snake.y < 0) snake.y = canvas.height - grid;
        else if (snake.y >= canvas.height) snake.y = 0;

        snake.cells.unshift({ x: snake.x, y: snake.y });
        if (snake.cells.length > snake.maxCells) snake.cells.pop();

        // Äpfel zeichnen und fressen
        apples.forEach((apple, index) => {
          ctx.fillStyle = "#e74c3c";
          ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

          if (snake.x === apple.x && snake.y === apple.y) {
            snake.maxCells++;
            score += 10;
            scoreElement.innerHTML = score;
            apples.splice(index, 1);
            spawnApple();
            spawnApple();
            spawnApple();
            spawnApple();
            spawnApple();
            spawnApple();

            appleCountElement.innerHTML = apples.length;
          }
        });

        // Schlange zeichnen (Kollisionsabfrage entfernt)
        ctx.fillStyle = "#2ecc71";
        snake.cells.forEach(function (cell) {
          ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);
          // Hier wurde der Code für die Selbstkollision gelöscht
        });
      }

      document.addEventListener("keydown", function (e) {
        if (e.which === 37 && snake.dx === 0) {
          snake.dx = -grid;
          snake.dy = 0;
        } else if (e.which === 38 && snake.dy === 0) {
          snake.dy = -grid;
          snake.dx = 0;
        } else if (e.which === 39 && snake.dx === 0) {
          snake.dx = grid;
          snake.dy = 0;
        } else if (e.which === 40 && snake.dy === 0) {
          snake.dy = grid;
          snake.dx = 0;
        }
      });

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
