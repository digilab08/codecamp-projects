<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
        <style>
            td
            {
               width: 100px;
               height: 100px;
            }
        </style>
    </head>
    <body>
        <template>
            <div style="margin: 40px; border-style: solid; border-radius: 50%;">

            </div>
        </template>
        <table id="table">
        </table>
    </body>
    <script>
        table = document.getElementById("table");
        row = document.createElement("tr");
            singleSquare = document.createElement("td");
        for(i = 0; i < 11; i++)
        {
            row.appendChild(singleSquare.cloneNode(true));
        }
        for(i = 0; i < 11; i++)
        {
            table.appendChild(row.cloneNode(true));
        }
    </script>
</html>
