<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!doctype html>
    <html lang="de">
      <head>
        <meta charset="UTF-8" />
        <title>Tic Tac Toe vs BOT</title>
        <style>
          body {
            font-family: "Arial", sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
          }
          #status {
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 10px;
          }
          .cell {
            width: 100px;
            height: 100px;
            background: #1e1e1e;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
          }
          .cell:hover {
            background: #2a2a2a;
            border-color: #00ffcc;
          }
          .cell.x {
            color: #ff0055;
          }
          .cell.o {
            color: #00ffcc;
          }
          button {
            margin-top: 30px;
            padding: 12px 25px;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-transform: uppercase;
            transition: 0.3s;
          }
          button:hover {
            background: #00ffcc;
            color: #121212;
            box-shadow: 0 0 15px #00ffcc;
          }
        </style>
      </head>
      <body>
        <div id="status">Du bist dran (X)</div>

        <div class="grid" id="board">
          <div class="cell" data-index="0"></div>
          <div class="cell" data-index="1"></div>
          <div class="cell" data-index="2"></div>
          <div class="cell" data-index="3"></div>
          <div class="cell" data-index="4"></div>
          <div class="cell" data-index="5"></div>
          <div class="cell" data-index="6"></div>
          <div class="cell" data-index="7"></div>
          <div class="cell" data-index="8"></div>
        </div>

        <button onclick="resetGame()">Spiel Neustarten</button>

        <script>
          let board = ["", "", "", "", "", "", "", "", ""];
          let active = true;
          const cells = document.querySelectorAll(".cell");
          const statusDisplay = document.getElementById("status");

          const winConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8], // Zeilen
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8], // Spalten
            [0, 4, 8],
            [2, 4, 6], // Diagonalen
          ];

          cells.forEach((cell) =>
            cell.addEventListener("click", handlePlayerMove),
          );

          function handlePlayerMove(e) {
            const index = e.target.getAttribute("data-index");
            if (board[index] !== "" || !active) return;

            makeMove(index, "X");

            if (active) {
              statusDisplay.innerText = "Bot überlegt...";
              setTimeout(botMove, 500); // Verzögerung für Realismus
            }
          }

          function botMove() {
            if (!active) return;

            // Einfache Bot-Logik: Wählt ein zufälliges freies Feld
            let available = board
              .map((val, idx) => (val === "" ? idx : null))
              .filter((val) => val !== null);

            if (available.length > 0) {
              const randomIndex =
                available[Math.floor(Math.random() * available.length)];
              makeMove(randomIndex, "O");
            }
          }

          function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase());
            checkWinner();
          }

          function checkWinner() {
            let roundWon = false;
            for (let condition of winConditions) {
              const [a, b, c] = condition;
              if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                roundWon = true;
                break;
              }
            }

            if (roundWon) {
              statusDisplay.innerText =
                board.includes("X") && !board.includes("O")
                  ? ""
                  : board.filter((x) => x === "X").length >
                      board.filter((x) => x === "O").length
                    ? "Du hast gewonnen! 🎉"
                    : "Der Bot hat gewonnen! 🤖";
              // Fix for status display
              const winner =
                board.filter((v) => v !== "").length % 2 === 0
                  ? "Bot (O)"
                  : "Du (X)";
              statusDisplay.innerText = `${winner} hat gewonnen!`;
              active = false;
              return;
            }

            if (!board.includes("")) {
              statusDisplay.innerText = "Unentschieden! 🤝";
              active = false;
              return;
            }
          }

          function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            active = true;
            statusDisplay.innerText = "Du bist dran (X)";
            cells.forEach((cell) => {
              cell.innerText = "";
              cell.classList.remove("x", "o");
            });
          }
        </script>
      </body>
    </html>
    <a href="game.html">zurück</a>
  </body>
</html>
