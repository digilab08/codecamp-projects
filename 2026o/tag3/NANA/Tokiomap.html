<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML5 Grundgerüst</title>
  </head>

  <body>
    <h1>Tokio</h1>
    <iframe
      title="Tokiomap"
      width="342"
      height="306"
      id="gmap_canvas"
      src="https://www.google.com/maps/place/Tokyo,+Japan/@35.5074465,139.1104405,9z/data=!3m1!4b1!4m6!3m5!1s0x605d1b87f02e57e7:0x2e01618b22571b89!8m2!3d35.6764225!4d139.650027!16zL20vMDdkZms?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D"
      scrolling="no"
    >
    </iframe>
    <br/>
    <input type="text" name="send(this)"/>
    <div id="nachrichten"></div>
  <div id="nachrichten"></div>

<script>
  const nachrichtenHtml = document.getElementById("nachrichten");

  function send(textInput) {
    nachrichtenHtml.innerText += textInput.value;
  }
</script>
</html>
